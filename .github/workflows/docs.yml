# Required Actions secrets on autoconnecto-workspace (Settings → Secrets → Actions):
#   GIT_READ_TOKEN    Fine-grained PAT: Contents READ on repos autoconnecto-backend +
#                     autoconnecto-frontend.
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY  (CI deploy to S3 / CloudFront)
#   DOCS_DEPLOY_KEY (SSH private key → clone autoconnecto-docs in this job)
#   EC2_HOST        Public hostname or IPv4 of the docs backend host
#   EC2_SSH_KEY     Private OpenSSH PEM whose public half matches EC2 Key pair assigned
#                     at launch (AWS Console → EC2 → Instances → Key pair name).
#
# Automated EC2 refresh (SSH, no login):
#   - Security group on EC2 must allow inbound TCP 22 from GitHub Actions IP ranges OR
#     (less ideal) from 0.0.0.0/0. See https://api.github.com/meta ("actions").
#   - Remote user default: ubuntu (set EC2_USER secret to override).
# After S3 uploads, SSH runs aws s3 sync using the EC2 instance role into
# ~/autoconnecto/artifacts/backend-generated (outside the backend Git repo), then
# restarts the backend container. The repo working tree must not receive CI sync.

name: Docs — Generate & Deploy

on:
  push:
    branches: [main]
    paths:
      - "frontend/src/**"
      - "backend/src/**"
      - "backend/scripts/**"
      - "docs/**"
      - ".github/workflows/docs.yml"
      - ".github/scripts/**"
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate-and-deploy:
    name: Generate docs & deploy to S3
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Pass PAT via env so actions/checkout always receives a non-empty token input.
    # If GIT_READ_TOKEN is missing, secrets.* is "" and checkout@v4 errors with
    # "Input required and not supplied: token".
    env:
      CHECKOUT_PAT: ${{ secrets.GIT_READ_TOKEN }}
      EC2_SYNC_HOST: ${{ secrets.EC2_HOST }}

    steps:
      - name: Ensure GIT_READ_TOKEN is set
        run: |
          if [ -z "$CHECKOUT_PAT" ]; then
            echo "::error::Repository secret GIT_READ_TOKEN is empty or missing."
            echo "Add it on autoconnecto-workspace: Settings → Secrets → Actions."
            echo "Name must be exactly: GIT_READ_TOKEN (fine-grained PAT, Contents: Read on backend + frontend)."
            exit 1
          fi
          echo "GIT_READ_TOKEN is present."

      - name: Ensure EC2 SSH secrets are set
        env:
          EC2_HOST_CHK: ${{ secrets.EC2_HOST }}
          EC2_KEY_CHK: ${{ secrets.EC2_SSH_KEY }}
        run: |
          if [ -z "$EC2_HOST_CHK" ]; then
            echo "::error::Secret EC2_HOST is empty. Use the instance public hostname or IPv4."
            exit 1
          fi
          if [ -z "$EC2_KEY_CHK" ]; then
            echo "::error::Secret EC2_SSH_KEY is empty. Paste full .pem matching EC2 » Key pair assigned at launch."
            exit 1
          fi
          echo "EC2 SSH sync enabled → $EC2_HOST_CHK"

      # Scripts used by SSH step live in this workspace repo (.github/scripts).
      - name: Checkout workspace (helper scripts only need default clone)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Workspace metadata links backend/frontend as git-submodule-style pointers — clone real repos beside ./backend and ./frontend.
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: autoconnecto/autoconnecto-backend
          ref: main
          path: backend
          token: ${{ env.CHECKOUT_PAT }}

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: autoconnecto/autoconnecto-frontend
          ref: main
          path: frontend
          token: ${{ env.CHECKOUT_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate documentation
        working-directory: backend
        env:
          DOCS_FRONTEND_ROOT: ${{ github.workspace }}/frontend/src
          NODE_ENV: production
        run: npm run docs:generate:standalone

      - name: Verify generated docs
        working-directory: backend
        run: |
          echo "=== Generated scopes ==="
          ls docs/generated/
          echo "=== navigation.json (head) ==="
          python3 -m json.tool < docs/generated/navigation.json | head -40

      - name: Clone VitePress docs repo (SSH)
        env:
          DOCS_DEPLOY_KEY: ${{ secrets.DOCS_DEPLOY_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Strip CRLF if key was pasted from Windows
          printf '%s\n' "$DOCS_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/docs_deploy_key
          chmod 600 ~/.ssh/docs_deploy_key
          ssh-keyscan -t rsa,ecdsa,ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND='ssh -i ~/.ssh/docs_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes'
          git clone git@github.com:autoconnecto/autoconnecto-docs.git docs

      - name: Sync to VitePress
        working-directory: backend
        run: node scripts/sync-docs-to-vitepress.mjs

      - name: Install VitePress dependencies
        working-directory: docs
        run: npm ci

      - name: Build VitePress site
        working-directory: docs
        run: npm run docs:build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy docs site to S3 (immutable assets)
        run: |
          aws s3 sync docs/docs/.vitepress/dist s3://autoconnecto-docs-site/ \
            --delete \
            --exclude "*.html" --exclude "sitemap.xml" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Deploy docs site to S3 (HTML)
        run: |
          aws s3 sync docs/docs/.vitepress/dist s3://autoconnecto-docs-site/ \
            --include "*.html" --include "sitemap.xml" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E30AD6N6537JGX \
            --paths "/*"

      - name: Upload raw generated docs for EC2 backend
        run: |
          aws s3 sync backend/docs/generated/ \
            s3://autoconnecto-docs-site/backend-generated/ \
            --delete \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Start ssh-agent (EC2 CI key)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Sync generated markdown on EC2 (S3 -> artifacts dir + restart backend)
        env:
          EC2_REMOTE_USER: ${{ secrets.EC2_USER }}
        run: |
          set -euo pipefail
          REMOTE="${EC2_REMOTE_USER:-ubuntu}"
          chmod +x .github/scripts/ec2-remote-pull-backend-docs.sh
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa,ecdsa,ed25519 "$EC2_SYNC_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          SCP_OPTS="-o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          # shellcheck disable=SC2086
          scp $SCP_OPTS .github/scripts/ec2-remote-pull-backend-docs.sh \
            "${REMOTE}@${EC2_SYNC_HOST}:/tmp/ec2-remote-pull-backend-docs.sh"
          ssh $SCP_OPTS "${REMOTE}@${EC2_SYNC_HOST}" \
            "chmod +x /tmp/ec2-remote-pull-backend-docs.sh && bash /tmp/ec2-remote-pull-backend-docs.sh"

      - name: Summary
        run: |
          echo "### Docs deployed ✓" >> $GITHUB_STEP_SUMMARY
          echo "- **Live at**: https://docs.autoconnecto.in" >> $GITHUB_STEP_SUMMARY
          echo "- **EC2 backend markdown artifact:** \`s3://autoconnecto-docs-site/backend-generated/\` → SSH → \`/home/ubuntu/autoconnecto/artifacts/backend-generated\` (outside Git clone; bind-mount into backend container)." >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
