# Required Actions secrets on autoconnecto-workspace (Settings → Secrets → Actions):
#   GIT_READ_TOKEN    Fine-grained PAT: Contents READ on repos autoconnecto-backend +
#                     autoconnecto-frontend. The default GITHUB_TOKEN only sees THIS repo,
#                     so cross-repo checkout of private siblings fails with "not found").
# (Also: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, DOCS_DEPLOY_KEY, EC2_SSH_KEY, EC2_HOST.)

name: Docs — Generate & Deploy

on:
  push:
    branches: [main]
    paths:
      - "frontend/src/**"
      - "backend/src/**"
      - "backend/scripts/**"
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate-and-deploy:
    name: Generate docs & deploy to S3
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Pass PAT via env so actions/checkout always receives a non-empty token input.
    # If GIT_READ_TOKEN is missing, secrets.* is "" and checkout@v4 errors with
    # "Input required and not supplied: token".
    env:
      CHECKOUT_PAT: ${{ secrets.GIT_READ_TOKEN }}

    steps:
      - name: Ensure GIT_READ_TOKEN is set
        run: |
          if [ -z "$CHECKOUT_PAT" ]; then
            echo "::error::Repository secret GIT_READ_TOKEN is empty or missing."
            echo "Add it on autoconnecto-workspace: Settings → Secrets → Actions."
            echo "Name must be exactly: GIT_READ_TOKEN (fine-grained PAT, Contents: Read on backend + frontend)."
            exit 1
          fi
          echo "GIT_READ_TOKEN is present."

      # Workspace repo tracks backend/frontend as gitlinks without .gitmodules, so default
      # checkout leaves backend/frontend empty → npm ci finds no package-lock.
      # Check out backend + frontend repos explicitly next to docs/ sibling layout.
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: autoconnecto/autoconnecto-backend
          ref: main
          path: backend
          token: ${{ env.CHECKOUT_PAT }}

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: autoconnecto/autoconnecto-frontend
          ref: main
          path: frontend
          token: ${{ env.CHECKOUT_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate documentation
        working-directory: backend
        env:
          DOCS_FRONTEND_ROOT: ${{ github.workspace }}/frontend/src
          NODE_ENV: production
        run: npm run docs:generate:standalone

      - name: Verify generated docs
        working-directory: backend
        run: |
          echo "=== Generated scopes ==="
          ls docs/generated/
          echo "=== navigation.json (head) ==="
          python3 -m json.tool < docs/generated/navigation.json | head -40

      - name: Clone VitePress docs repo (SSH)
        env:
          DOCS_DEPLOY_KEY: ${{ secrets.DOCS_DEPLOY_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Strip CRLF if key was pasted from Windows
          printf '%s\n' "$DOCS_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/docs_deploy_key
          chmod 600 ~/.ssh/docs_deploy_key
          ssh-keyscan -t rsa,ecdsa,ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND='ssh -i ~/.ssh/docs_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes'
          git clone git@github.com:autoconnecto/autoconnecto-docs.git docs

      - name: Sync to VitePress
        working-directory: backend
        run: node scripts/sync-docs-to-vitepress.mjs

      - name: Install VitePress dependencies
        working-directory: docs
        run: npm ci

      - name: Build VitePress site
        working-directory: docs
        run: npm run docs:build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy docs site to S3 (immutable assets)
        run: |
          aws s3 sync docs/docs/.vitepress/dist s3://autoconnecto-docs-site/ \
            --delete \
            --exclude "*.html" --exclude "sitemap.xml" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Deploy docs site to S3 (HTML)
        run: |
          aws s3 sync docs/docs/.vitepress/dist s3://autoconnecto-docs-site/ \
            --include "*.html" --include "sitemap.xml" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E30AD6N6537JGX \
            --paths "/*"

      - name: Upload raw generated docs for EC2 backend
        run: |
          aws s3 sync backend/docs/generated/ \
            s3://autoconnecto-docs-site/backend-generated/ \
            --delete \
            --cache-control "public, max-age=0, must-revalidate"

      # Optional: push generated markdown onto EC2 disk for the in-app docs API.
      # Raw files are already at s3://autoconnecto-docs-site/backend-generated/ — if SSH
      # fails (wrong EC2_SSH_KEY vs instance key pair), run on EC2 manually:
      #   aws s3 sync s3://autoconnecto-docs-site/backend-generated/ \
      #     /home/ubuntu/autoconnecto/backend/docs/generated/ --region ap-south-1
      - name: Start ssh-agent (EC2 deploy key)
        continue-on-error: true
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Sync docs to EC2 backend
        continue-on-error: true
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa,ecdsa,ed25519 "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new ubuntu@"$EC2_HOST" \
            "aws s3 sync s3://autoconnecto-docs-site/backend-generated/ \
              /home/ubuntu/autoconnecto/backend/docs/generated/ \
              --region ap-south-1 && echo 'Docs synced to EC2'"

      - name: Summary
        run: |
          echo "### Docs deployed ✓" >> $GITHUB_STEP_SUMMARY
          echo "- **Live at**: https://docs.autoconnecto.in" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend markdown (S3):** \`s3://autoconnecto-docs-site/backend-generated/\`" >> $GITHUB_STEP_SUMMARY
          echo "- **EC2 disk sync:** SSH step may still fail if EC2_SSH_KEY ≠ instance key pair — run \`aws s3 sync\` on EC2 (see workflow comment)." >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
